name: Release Agent

on:
  push:
    tags:
      - 'agent-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Agent version (e.g., 1.2.0)'
        required: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION=${GITHUB_REF#refs/tags/agent-v}
          else
            VERSION=${{ github.event.inputs.version }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build release package
        run: |
          chmod +x build_release.sh
          ./build_release.sh ${{ steps.version.outputs.version }}

      - name: Verify package
        run: |
          PACKAGE="watchdock-agent-${{ steps.version.outputs.version }}.tar.gz"
          [ -f "$PACKAGE" ] || { echo "Package not found: $PACKAGE"; exit 1; }
          echo "Package: $PACKAGE ($(du -h $PACKAGE | awk '{print $1}'))"
          echo "SHA256: $(sha256sum $PACKAGE | awk '{print $1}')"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: agent-v${{ steps.version.outputs.version }}
          name: Agent v${{ steps.version.outputs.version }}
          body: |
            ## WatchDock Agent v${{ steps.version.outputs.version }}

            ### Install

            ```bash
            curl -fsSL https://api.watchdock.cc/install.sh | WATCHDOCK_API_TOKEN=pos_your_token_here sudo -E bash
            ```

            ### Upgrade (existing installation)

            ```bash
            curl -fsSL https://api.watchdock.cc/upgrade.sh | sudo bash
            ```

            ### Documentation

            See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for configuration and management.
          files: |
            watchdock-agent-${{ steps.version.outputs.version }}.tar.gz
            build/release-info.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
